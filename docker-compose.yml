services:

  # ─────────────────────────────────────────────
  # SERVICIO: db
  # Base de datos PostgreSQL.
  # No necesita Dockerfile propio: usa la imagen
  # oficial de Docker Hub.
  # ─────────────────────────────────────────────
  db:
    image: postgres:14.3
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: always
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - teslo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # SERVICIO: backend
  # API NestJS.
  # Construye la imagen desde ./teslo-shop usando
  # la etapa definida en STAGE (.env).
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./teslo-shop
      target: ${STAGE}
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME}
    restart: always
    ports:
      - "${BACKEND_PUBLISH_PORT}:${PORT}"
    environment:
      APP_VERSION: ${APP_VERSION}
      STAGE: ${STAGE}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      PORT: ${PORT}
      HOST_API: ${HOST_API}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./teslo-shop:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teslo-network
    command: yarn start:dev

 # ─────────────────────────────────────────────
  # SERVICIO: frontend
  # Angular compilado y servido con Nginx.
  # Construye la imagen desde ./angular-tesloshop.
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./angular-tesloshop
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: always
    ports:
      - "${FRONTEND_PUBLISH_PORT}:80"
    depends_on:
      - backend
    networks:
      - teslo-network

# ─────────────────────────────────────────────
# VOLÚMENES
# postgres-data persiste los datos de la base
# de datos entre reinicios del contenedor.
# ─────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ─────────────────────────────────────────────
# REDES
# teslo-network es la red interna bridge que
# conecta los tres servicios. Los nombres de
# servicio actúan como hostnames DNS.
# ─────────────────────────────────────────────
networks:
  teslo-network:
    driver: bridge